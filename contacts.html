<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты</title>
    <meta name="yandex-verification" content="ca813e2511662e82" />
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f4fa; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 32px; overflow: hidden; }
        .header { background: #1e3c72; color: white; padding: 20px; text-align: center; }
        .nav { background: #f8fafc; padding: 12px 20px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .nav a { color: #1e3c72; text-decoration: none; font-weight: 500; }
        .content { padding: 28px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 12px; }
        button { background: #1e3c72; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .footer { text-align: center; font-size: 0.75rem; color: #64748b; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>✉️ Контакты</h1></div>
    <div class="nav">
        <a href="/">Главная</a><a href="/about.html">О проекте</a><a href="/faq.html">FAQ</a><a href="/contacts.html">Контакты</a>
    </div>
    <div class="content">
        <p>Если у вас есть вопросы, предложения или вы нашли ошибку — напишите.</p>
        <form id="contactForm">
            <div class="form-group"><label>Имя</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Сообщение</label><textarea rows="4" id="message" required></textarea></div>
            <button type="submit">Отправить</button>
        </form>
        <div id="status" style="margin-top: 15px;"></div>
    </div>
    <div class="footer">Обычный ответ в течение 1-2 дней (демо-режим)</div>
</div>
<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('status').innerHTML = '<p style="color: green;">✅ Сообщение отправлено (демо). Свяжусь с вами.</p>';
        this.reset();
    });
</script>
</body>
</html>
