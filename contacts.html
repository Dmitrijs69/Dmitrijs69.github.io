<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты | nalogic.ru</title>
    <meta name="description" content="Свяжитесь с нами по вопросам работы калькуляторов, предложениям сотрудничества.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter;background:#f8fafc;padding:20px}
        .container{max-width:800px;margin:auto;background:white;border-radius:48px;padding:40px;box-shadow:0 20px 40px -12px rgba(0,0,0,0.1)}
        .nav{display:flex;gap:24px;margin-bottom:32px;flex-wrap:wrap}
        .nav a{color:#3b82f6;text-decoration:none;font-weight:500}
        h1{margin-bottom:24px}
        input,textarea{width:100%;margin-bottom:16px;padding:14px;border-radius:32px;border:1px solid #cbd5e1}
        button{background:#3b82f6;color:white;border:none;padding:14px 28px;border-radius:40px;cursor:pointer}
        .footer{margin-top:40px;text-align:center;color:#64748b}
    </style>
</head>
<body>
<div class="container">
    <div class="nav"><a href="/">Главная</a><a href="/about.html">О проекте</a><a href="/faq.html">FAQ</a><a href="/blog.html">Блог</a><a href="/contacts.html">Контакты</a></div>
    <h1>✉️ Контакты</h1>
    <p>Вы можете написать нам по любым вопросам: предложения по улучшению калькуляторов, сотрудничество, сообщения об ошибках.</p>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="email" id="email" placeholder="Ваш Email" required>
        <textarea rows="5" id="message" placeholder="Сообщение" required></textarea>
        <button type="submit">Отправить</button>
    </form>
    <div id="status" style="margin-top:16px;"></div>
    <div class="footer">или напишите напрямую: support@nalogic.ru (пока не настроено, демо-режим)</div>
</div>
<script>
    document.getElementById('contactForm').addEventListener('submit',(e)=>{e.preventDefault();document.getElementById('status').innerHTML='<p style="color:green;">✅ Сообщение отправлено (демо). Мы свяжемся с вами.</p>';e.target.reset();});
</script>
</body>
</html>
